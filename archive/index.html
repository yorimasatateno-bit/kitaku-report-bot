<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帰宅時間レポート アーカイブ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Noto Sans JP', sans-serif; background: #f8fafc; }</style>
</head>
<body class="py-10 px-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-700 mb-1 text-center">🏠 帰宅時間レポート</h1>
    <p class="text-center text-slate-400 text-sm mb-8">過去の送信カード一覧（4件）</p>
    <div class="grid grid-cols-2 gap-4">
      
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
          <img src="https://maji-kitaku.surge.sh/cards/2026-04-16.png" alt="2026-04-16 帰宅カード" class="w-full">
          <div class="px-4 py-3">
            <div class="text-sm font-bold text-slate-700">2026-04-16</div>
            <div class="text-xs text-slate-500 mt-1">🕐 21:20 ／ 📝 オンラインセミナーに受けてから帰宅なんで</div>
            <div class="text-xs text-slate-400 mt-1">送信: 2026/04/16 08:16</div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
          <img src="https://maji-kitaku.surge.sh/cards/2026-04-15.png" alt="2026-04-15 帰宅カード" class="w-full">
          <div class="px-4 py-3">
            <div class="text-sm font-bold text-slate-700">2026-04-15</div>
            <div class="text-xs text-slate-500 mt-1">🕐 22:30 ／ 📝 あこんな感じよね</div>
            <div class="text-xs text-slate-400 mt-1">送信: 2026/04/15 15:52</div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
          <img src="https://maji-kitaku.surge.sh/cards/2026-04-14.png" alt="2026-04-14 帰宅カード" class="w-full">
          <div class="px-4 py-3">
            <div class="text-sm font-bold text-slate-700">2026-04-14</div>
            <div class="text-xs text-slate-500 mt-1">🕐 21:45 ／ 📝 こんな感じが今後は普通くらいになりそう。</div>
            <div class="text-xs text-slate-400 mt-1">送信: 2026/04/14 15:57</div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
          <img src="https://maji-kitaku.surge.sh/cards/2026-04-08.png" alt="2026-04-08 帰宅カード" class="w-full">
          <div class="px-4 py-3">
            <div class="text-sm font-bold text-slate-700">2026-04-08</div>
            <div class="text-xs text-slate-500 mt-1">🕐 19:30 ／ 📝 座学ばっかりで今日は早いのかな</div>
            <div class="text-xs text-slate-400 mt-1">送信: 2026/04/08 08:46</div>
          </div>
        </div>
    </div>
  </div>
  <p class="text-center text-xs text-slate-300 mt-10">自動レポートBot × マジくん</p>
</body>
</html>
